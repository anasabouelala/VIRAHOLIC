<head>

  <meta charset="UTF-8" />

  <title>AEOHOLIC - AEO & LLM Visibility</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://assets.lemonsqueezy.com/lemon.js" defer></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Outfit', 'sans-serif'],
          },
          colors: {
            background: '#050505',
            surface: '#0A0A0A',
            border: '#1F1F1F',
            primary: '#FFFFFF',
            secondary: '#A1A1AA',
            accent: '#3B82F6', // A precise technical blue
          },
          animation: {
            'fade-in': 'fadeIn 0.5s ease-out',
            'slide-up': 'slideUp 0.5s ease-out',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideUp: {
              '0%': { transform: 'translateY(20px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #050505;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      font-family: 'Outfit', sans-serif;
    }

    /* Tech Grid Background */
    .bg-grid {
      background-size: 40px 40px;
      background-image: linear-gradient(to right, #1f1f1f 1px, transparent 1px),
        linear-gradient(to bottom, #1f1f1f 1px, transparent 1px);
      mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
      -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #050505;
    }

    ::-webkit-scrollbar-thumb {
      background: #27272a;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #3f3f46;
    }

    /* Map Animations */
    @keyframes sonic-pulse {
      0% {
        transform: scale(0.5);
        opacity: 0.8;
      }
      100% {
        transform: scale(2.5);
        opacity: 0;
      }
    }

    @keyframes pulse-subtle {
      0%, 100% { opacity: 0.1; transform: scale(0.98); }
      50% { opacity: 0.3; transform: scale(1.02); }
    }

    .pulse-subtle {
      animation: pulse-subtle 4s ease-in-out infinite;
    }

    .animate-sonic-fast {
      animation: sonic-pulse 1.5s cubic-bezier(0, 0, 0.2, 1) infinite;
      transform-origin: center;
    }

    .animate-sonic-med {
      animation: sonic-pulse 3s cubic-bezier(0, 0, 0.2, 1) infinite;
      transform-origin: center;
    }

    .animate-sonic-slow {
      animation: sonic-pulse 5s cubic-bezier(0, 0, 0.2, 1) infinite;
      transform-origin: center;
    }

    .animate-sonic {
      animation: sonic-pulse 3s cubic-bezier(0, 0, 0.2, 1) infinite;
      transform-origin: center;
    }

    .delay-1 {
      animation-delay: 1s;
    }

    .delay-2 {
      animation-delay: 2s;
    }
  </style>
</head>
